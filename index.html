<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CheckCourses V48</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛒%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .checked-item { background-color: #f0fdf4 !important; opacity: 0.5; border-color: transparent !important; }
        .checked-text { text-decoration: line-through; color: #166534; }
        #scannerContainer { position: sticky; top: 115px; z-index: 30; }
        #reader { width: 100%; height: 140px; border-radius: 20px; overflow: hidden; background: #000; position: relative; }
        #reader video, #reader canvas { border-radius: 20px; width: 100%; height: 140px; object-fit: cover; }
        .drawingBuffer { position: absolute; top: 0; left: 0; z-index: 10; }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        #scanNotice { transition: all 0.3s ease; transform: translateY(150%); z-index: 100; }
        #scanNotice.show { transform: translateY(0); }
        .cat-badge { font-size: 9px; padding: 2px 6px; border-radius: 99px; text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-900 font-sans select-none">

    <!-- MODAL LIAISON MANUELLE -->
    <div id="selectionModal" class="hidden fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-6 overflow-hidden flex flex-col max-h-[90vh]">
            <h3 id="modalTitle" class="text-xl font-black mb-2 italic">Liaison Manuelle</h3>
            <div id="modalChoices" class="overflow-y-auto mb-6 pr-2"></div>
            <div id="batchActionContainer" class="hidden mb-4"><button onclick="validateBatch()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase">Tout valider ✅</button></div>
            <button onclick="closeSelectionModal()" class="w-full py-4 text-slate-400 font-black uppercase text-[10px]">Fermer</button>
        </div>
    </div>

    <!-- FLASH -->
    <div id="scanNotice" class="fixed inset-x-0 bottom-24 mx-4 p-5 rounded-[2rem] shadow-2xl flex flex-col items-center justify-center text-center border-4 hidden text-white">
        <div id="noticeIcon" class="text-3xl mb-1"></div>
        <div id="noticeTitle" class="text-base font-black uppercase"></div>
        <div id="noticeMsg" class="text-[10px] font-bold opacity-90"></div>
    </div>

    <!-- LOADING -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/95 z-[110] flex flex-col items-center justify-center p-8 text-center">
        <div class="loader w-14 h-14 border-4 border-slate-200 rounded-full mb-6"></div>
        <h2 class="text-lg font-black italic text-blue-600 uppercase">Analyse...</h2>
    </div>

    <div class="max-w-md mx-auto pb-32">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="px-6 py-4 flex justify-between items-center border-b">
                <h1 class="text-xl font-black tracking-tighter italic uppercase">
                    <span class="text-slate-900">CHECK</span><span class="text-blue-600">COURSES</span>
                </h1>
                <div id="main-counter" class="bg-blue-600 text-white text-[10px] font-black px-2.5 py-1 rounded-full">0/0</div>
            </div>
            <div id="searchBar" class="px-4 py-3 bg-slate-50 border-b border-slate-200">
                <input type="text" id="manualSearchInput" oninput="renderList()" placeholder="🔍 Recherche manuelle..." class="w-full pl-4 pr-4 py-2.5 bg-white border-2 border-slate-200 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none">
            </div>
        </header>

        <main class="p-4">
            <div id="view-active">
                <!-- STEP SYNC -->
                <section id="stepSync" class="step-content">
                    <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-200 text-center">
                        <div class="text-5xl mb-4">🤝</div>
                        <input type="text" id="syncCodeInput" class="w-full p-4 border-2 border-slate-100 rounded-2xl mb-4 text-center font-bold" placeholder="Code Famille">
                        <button onclick="initSync()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase active:scale-95 transition">Rejoindre</button>
                        <button onclick="skipSync()" class="w-full mt-4 text-slate-400 text-[10px] font-bold uppercase underline">Mode Local</button>
                    </div>
                </section>

                <!-- STEP 1 : IMPORT -->
                <section id="step1" class="step-content hidden text-center">
                    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
                        <div class="text-lg font-black mb-6 text-slate-300 uppercase italic">Facture PDF</div>
                        <label class="block cursor-pointer bg-blue-600 text-white font-black py-5 px-8 rounded-3xl shadow-xl active:scale-95 transition text-lg uppercase tracking-widest text-sm">Importer le Bon<input type="file" id="fileInput" class="hidden" accept="image/*,.pdf" onchange="startProcess(this)"></label>
                    </div>
                </section>

                <!-- STEP 2 : REVIEW -->
                <section id="stepReview" class="step-content hidden space-y-4">
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 text-center">
                        <textarea id="rawTextEditor" class="w-full h-80 p-5 border-2 border-slate-100 rounded-2xl text-sm font-medium outline-none focus:border-blue-500 mb-4"></textarea>
                        <button onclick="confirmList()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest">Lancer le scan ✅</button>
                    </div>
                </section>

                <!-- STEP 3 : SCAN -->
                <section id="step2" class="step-content hidden space-y-4">
                    <div id="scannerContainer" class="bg-white p-2.5 rounded-[1.8rem] shadow-xl border border-slate-200">
                        <div id="reader"></div>
                        <div class="flex justify-between items-center mt-2 px-2">
                            <span id="lastScannedName" class="text-[9px] font-bold text-blue-600 truncate max-w-[70%] uppercase tracking-tighter italic">Prêt...</span>
                            <button onclick="toggleScanner()" id="btnToggleScanner" class="bg-red-50 text-red-600 px-3 py-1 rounded-full text-[8px] font-black uppercase">Stop</button>
                        </div>
                    </div>
                    <div id="itemsList" class="space-y-3 pt-2"></div>
                    <button onclick="archiveOrder()" class="w-full bg-green-500 text-white font-black py-6 rounded-[2.2rem] shadow-xl mt-10 uppercase text-sm">Finir Livraison</button>
                    <button onclick="resetApp()" class="w-full mt-4 text-slate-300 text-[10px] font-bold uppercase text-center tracking-widest">Reset</button>
                </section>
            </div>

            <div id="view-history" class="hidden space-y-6 text-left">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-xl font-black italic uppercase text-slate-800">Archives</h2>
                    <button onclick="clearHistory()" class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-1.5 rounded-full uppercase">Vider</button>
                </div>
                <div id="history-container" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around p-2 z-50 safe-bottom">
        <button onclick="switchView('active')" id="tab-active" class="flex flex-col items-center py-2 px-8 tab-active transition-all"><span class="text-2xl">📦</span><span class="text-[9px] font-black uppercase">Scan</span></button>
        <button onclick="switchView('history')" id="tab-history" class="flex flex-col items-center py-2 px-8 text-slate-300 transition-all"><span class="text-2xl">📜</span><span class="text-[9px] font-black uppercase tracking-widest">Archives</span></button>
    </nav>

    <script>
        const SUPABASE_URL = "https://pefpsvulzgjhidjowcue.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZnBzdnVsemdqaGlkam93Y3VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjU2NTUsImV4cCI6MjA4OTM0MTY1NX0.QpToxUfjbB8MzY8svYLxAVEqerz-u52zpUTu3NobdoY";
        
        let dbClient = null;
        try {
            if (typeof supabase !== 'undefined') {
                dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) { console.error("Supabase fail", e); }

        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let shoppingList = [], isScanning = false, lastCode = "", lastScanTime = 0, isProcessingScan = false, currentSyncId = null, currentBatchName = null, pendingBarcode = "";

        const NOISE_WORDS = ["bio", "petit", "pot", "pots", "bols", "maman", "idee", "tout", "petits", "des", "mois", "ans", "aux", "avec", "sans", "sucre", "ajoutes", "materne", "hipp", "nature", "fraiche", "fraîche", "fermier", "fermière", "produit", "calibre", "moyen", "direct", "producteur"];
        const CATEGORIES = {
            "FRAIS": { icon: "🥛", label: "Frais", keywords: /lait|yaourt|beurre|fromage|steak|jambon|poulet|oeuf|traiteur|chiffonnade|beillevaire|creme/i },
            "FRUITS": { icon: "🍎", label: "Fruits & Légumes", keywords: /pomme|banane|tomate|carotte|salade|oignon|fruit|legume|poire|melon|mangue|mais|pois|fraise|peche|courgette|haricot|chou/i },
            "BOISSONS": { icon: "🥤", label: "Boissons", keywords: /eau|jus|soda|biere|vin|cola|the|ice tea|lipton|innocent|volvic|sirop/i },
            "EPICERIE": { icon: "📦", label: "Épicerie", keywords: /pate|riz|gateau|chocolat|sucre|farine|conserve|muesli|biscuit|sable|granola|cereale|chocapic|bjorg|gerble|savon|shampoing|dentifrice|lessive|entretien|hygiene/i },
            "AUTRE": { icon: "✨", label: "Autres", keywords: /./i }
        };

        window.onload = function() {
            try {
                const saved = localStorage.getItem('ch_active_session');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed && parsed.length > 0) {
                        shoppingList = parsed;
                        currentSyncId = shoppingList[0]?.session_id || null;
                        if(currentSyncId) { subscribeToChanges(); }
                        showStep('step2'); renderList();
                        return;
                    }
                }
            } catch (e) { localStorage.removeItem('ch_active_session'); }
            showStep('stepSync');
        };

        function showStep(id) { 
            document.querySelectorAll('.step-content').forEach(s => s.classList.add('hidden')); 
            const el = document.getElementById(id);
            if (el) el.classList.remove('hidden'); 
        }

        function switchView(view) {
            const active = document.getElementById('view-active'), history = document.getElementById('view-history'), tabA = document.getElementById('tab-active'), tabH = document.getElementById('tab-history');
            if (view === 'active') { active.classList.remove('hidden'); history.classList.add('hidden'); tabA.classList.add('tab-active'); tabA.classList.remove('text-slate-300'); tabH.classList.remove('tab-active'); tabH.classList.add('text-slate-300'); }
            else { active.classList.add('hidden'); history.classList.remove('hidden'); tabA.classList.remove('tab-active'); tabA.classList.add('text-slate-300'); tabH.classList.add('tab-active'); tabH.classList.remove('text-slate-300'); renderHistory(); if (isScanning) toggleScanner(); }
        }

        async function initSync() {
            const code = document.getElementById('syncCodeInput').value.trim().toLowerCase();
            if (!code) return alert("Entrez un code");
            currentSyncId = code;
            if (dbClient) {
                setLoading(true);
                const { data } = await dbClient.from('shopping_items').select('*').eq('session_id', currentSyncId);
                setLoading(false);
                if (data && data.length > 0) { 
                    shoppingList = data; 
                    localStorage.setItem('ch_active_session', JSON.stringify(shoppingList));
                    showStep('step2'); renderList(); subscribeToChanges(); 
                } else { showStep('step1'); }
            } else { alert("Sync indisponible"); showStep('step1'); }
        }

        function skipSync() { currentSyncId = null; showStep('step1'); }

        function subscribeToChanges() {
            if (!dbClient || !currentSyncId) return;
            dbClient.channel('sync-list').on('postgres_changes', { event: '*', schema: 'public', table: 'shopping_items' }, async (payload) => {
                if (payload.eventType === 'UPDATE' && payload.new.session_id === currentSyncId) {
                    const item = shoppingList.find(i => i.id === payload.new.id);
                    if (item) { item.scanned = payload.new.scanned; renderList(); }
                } 
                if (payload.eventType === 'DELETE') {
                    const { count } = await dbClient.from('shopping_items').select('*', { count: 'exact', head: true }).eq('session_id', currentSyncId);
                    if (count === 0) { localStorage.removeItem('ch_active_session'); location.reload(); }
                }
            }).subscribe();
        }

        async function startProcess(input) {
            const file = input.files[0]; if (!file) return; setLoading(true);
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        text += textContent.items.map(it => it.str).join(" ") + "\n";
                    }
                } else { const { data: { text: ocrText } } = await Tesseract.recognize(file, 'fra'); text = ocrText; }
                displayReview(text);
            } catch (err) { alert(err.message); }
            setLoading(false);
        }

        function displayReview(text) {
            showStep('stepReview');
            const cleanText = text.replace(/\n/g, ' ');
            const regex = /(\d+[.,]\d+)\s+(\d+[.,]\d+%\s+)(.*?)(?=\s+\d+[.,]\d{2}€)/g;
            let results = []; let matches;
            while ((matches = regex.exec(cleanText)) !== null) {
                let qty = Math.floor(parseFloat(matches[1].replace(',', '.')));
                if (qty > 30) qty = 1;
                let name = matches[3].trim().split(/\d+[.,]\d{2}/)[0].trim();
                if (name.length > 3 && !name.match(/Désignation|Montant/i)) { for (let j = 0; j < qty; j++) results.push(name); }
            }
            document.getElementById('rawTextEditor').value = results.length > 0 ? results.join('\n') : text;
        }

        async function confirmList() {
            const lines = document.getElementById('rawTextEditor').value.split('\n').filter(l => l.trim().length > 1);
            shoppingList = lines.map((l, i) => {
                let cat = "AUTRE";
                for(let c in CATEGORIES) { if(l.match(CATEGORIES[c].keywords)) { cat = c; break; } }
                return { id: Date.now() + i, session_id: currentSyncId, name: l.trim(), category: cat, scanned: false };
            });
            if (currentSyncId && dbClient) {
                setLoading(true);
                await dbClient.from('shopping_items').delete().eq('session_id', currentSyncId);
                const { data } = await dbClient.from('shopping_items').insert(shoppingList).select();
                if (data) shoppingList = data;
                subscribeToChanges(); setLoading(false);
            }
            showStep('step2'); localStorage.setItem('ch_active_session', JSON.stringify(shoppingList));
            renderList(); setTimeout(toggleScanner, 500);
        }

        function toggleScanner() {
            if (isScanning) { Quagga.stop(); isScanning = false; document.getElementById('btnToggleScanner').innerText = "Start"; } 
            else {
                Quagga.init({
                    inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#reader'), constraints: { facingMode: "environment", width: 1280, height: 720 } },
                    locator: { patchSize: "medium", halfSample: false },
                    decoder: { readers: ["ean_reader", "ean_8_reader", "upc_reader"] },
                    locate: true
                }, (err) => { if (err) return; Quagga.start(); isScanning = true; document.getElementById('btnToggleScanner').innerText = "Stop"; });
            }
        }

        async function fetchWithRetry(url, retries = 2) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.status === 1) return data;
                    }
                } catch (e) {}
                if (i < retries - 1) await new Promise(r => setTimeout(r, 400));
            }
            return null;
        }

        function formatPreciseName(product) {
            const brand = product.brands ? product.brands.split(',')[0].trim() : "";
            const name = product.product_name_fr || product.product_name || "";
            const qty = product.quantity ? product.quantity : "";
            let fullName = brand ? (brand.toUpperCase() + " " + name) : name;
            if (qty) fullName += " " + qty;
            return fullName.trim();
        }

        async function getProductName(code) {
            try {
                pendingBarcode = code;
                const statusLabel = document.getElementById('lastScannedName');
                statusLabel.innerText = "🔍 Mémoire...";
                if (dbClient) {
                    const { data: custom } = await dbClient.from('custom_products').select('name').eq('barcode', code).single();
                    if (custom) return custom.name;
                }
                await new Promise(r => setTimeout(r, 200));
                statusLabel.innerText = "🔍 Alimentaire...";
                const dataFood = await fetchWithRetry(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                if (dataFood) return formatPreciseName(dataFood.product);
                await new Promise(r => setTimeout(r, 300));
                statusLabel.innerText = "🔍 Hygiène...";
                const dataBeauty = await fetchWithRetry(`https://world.openbeautyfacts.org/api/v0/product/${code}.json`);
                if (dataBeauty) return formatPreciseName(dataBeauty.product);
                return null;
            } catch (e) { return null; }
        }

        Quagga.onDetected(async (data) => {
            const code = data.codeResult.code; const now = Date.now();
            if (!code || isProcessingScan || (code === lastCode && now - lastScanTime < 5000)) return;
            isProcessingScan = true; lastCode = code; lastScanTime = now;
            const name = await getProductName(code);
            if (name) { document.getElementById('lastScannedName').innerText = name; smartMatch(name, code); }
            else { openManualLinkModal(code, "Inconnu"); }
        });

        function smartMatch(scannedName, barcode) {
            const normalize = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,()]/g, "").split(" ").filter(w => w.length > 2 && !NOISE_WORDS.includes(w));
            const scannedWords = normalize(scannedName);
            let allPotentials = shoppingList.filter(item => {
                const itemWords = normalize(item.name);
                const hasSolidMatch = scannedWords.some(sw => itemWords.includes(sw));
                const sLow = scannedName.toLowerCase(), iLow = item.name.toLowerCase();
                if (sLow.includes("creme") && !iLow.includes("creme")) return false;
                if (sLow.includes("poulet") && !iLow.includes("poulet")) return false;
                if (sLow.includes("banane") && !iLow.includes("banane")) return false;
                if (sLow.includes("pomme") && !iLow.includes("pomme")) return false;
                let score = 0; scannedWords.forEach(sw => { if (itemWords.includes(sw)) score++; });
                return hasSolidMatch && (score / scannedWords.length >= 0.3);
            });
            let remaining = allPotentials.filter(i => !i.scanned);
            if (allPotentials.length > 0 && remaining.length === 0) { showFlash("Déjà validé", scannedName, "warning"); isProcessingScan = false; }
            else if (remaining.length === 0 || remaining.length > 1) { openManualLinkModal(barcode, scannedName, remaining); }
            else if (remaining.length === 1) {
                const sameCount = shoppingList.filter(i => i.name === remaining[0].name && !i.scanned).length;
                if (sameCount > 1) { currentBatchName = remaining[0].name; openSelectionModal(remaining, true); }
                else { toggleItemState(remaining[0]); isProcessingScan = false; }
            }
        }

        function openManualLinkModal(barcode, apiName, suggested = []) {
            if (isScanning) Quagga.stop();
            const container = document.getElementById('modalChoices');
            container.innerHTML = `<div class="p-4 bg-blue-50 rounded-3xl mb-4 border border-blue-100 text-left"><p class="text-[9px] font-black text-blue-400 uppercase leading-none mb-1">Code : ${barcode}</p><p class="text-sm font-bold text-blue-700">${apiName}</p></div><div class="sticky top-0 bg-white pb-3 z-10"><input type="text" id="linkSearchInput" placeholder="🔍 Chercher..." class="w-full p-4 bg-slate-100 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none"></div><div id="linkChoicesContainer" class="space-y-2 pb-4"></div>`;
            const search = document.getElementById('linkSearchInput'), list = document.getElementById('linkChoicesContainer');
            const update = (f = "") => {
                list.innerHTML = '';
                shoppingList.filter(i => !i.scanned && i.name.toLowerCase().includes(f.toLowerCase())).forEach(item => {
                    const isS = suggested.some(si => si.id === item.id);
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left p-4 rounded-2xl border-2 font-bold text-sm transition-all ${isS ? 'border-blue-500 bg-blue-50' : 'border-slate-100 bg-slate-50'}`;
                    btn.innerHTML = `${item.name} ${isS ? '<span class="float-right">💡</span>' : ''}`;
                    btn.onclick = async () => { if(dbClient) await dbClient.from('custom_products').insert([{ barcode, name: item.name }]); toggleItemState(item); closeSelectionModal(); };
                    list.appendChild(btn);
                });
            };
            search.oninput = (e) => update(e.target.value); update();
            document.getElementById('modalTitle').innerText = suggested.length > 0 ? "Choix multiple" : "Inconnu";
            document.getElementById('selectionModal').classList.remove('hidden');
        }

        function openSelectionModal(candidates, isBatch = false) {
            if (isScanning) Quagga.stop();
            const container = document.getElementById('modalChoices'), batchContainer = document.getElementById('batchActionContainer');
            container.innerHTML = ''; document.getElementById('modalTitle').innerText = isBatch ? "Quantité multiple" : "Choix";
            if(isBatch) { batchContainer.classList.remove('hidden'); container.innerHTML = `<div class="p-6 bg-blue-50 rounded-2xl text-center font-black text-blue-600">${candidates[0].name}</div>`; }
            document.getElementById('selectionModal').classList.remove('hidden');
        }

        async function validateBatch() {
            setLoading(true);
            const items = shoppingList.filter(i => i.name === currentBatchName && !i.scanned);
            for(let it of items) { it.scanned = true; if (currentSyncId && dbClient) await dbClient.from('shopping_items').update({ scanned: true }).eq('id', it.id); }
            localStorage.setItem('ch_active_session', JSON.stringify(shoppingList));
            renderList(); setLoading(false); closeSelectionModal(); showFlash("Lot Validé", currentBatchName, "success");
        }

        function closeSelectionModal() { document.getElementById('selectionModal').classList.add('hidden'); isProcessingScan = false; if (isScanning) Quagga.start(); }

        async function toggleItemState(item) {
            item.scanned = !item.scanned;
            if (currentSyncId && dbClient) await dbClient.from('shopping_items').update({ scanned: item.scanned }).eq('id', item.id);
            localStorage.setItem('ch_active_session', JSON.stringify(shoppingList));
            renderList();
            if (item.scanned) { showFlash("Validé", item.name, "success"); if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }
            isProcessingScan = false;
        }

        function renderList() {
            const container = document.getElementById('itemsList'); container.innerHTML = '';
            const query = document.getElementById('manualSearchInput').value.toLowerCase();
            const filtered = shoppingList.filter(item => item.name.toLowerCase().includes(query));
            const groups = filtered.reduce((acc, item) => { if (!acc[item.category]) acc[item.category] = []; acc[item.category].push(item); return acc; }, {});
            Object.keys(CATEGORIES).forEach(catKey => {
                if (!groups[catKey]) return;
                const section = document.createElement('div');
                section.innerHTML = `<div class="flex items-center gap-2 mb-3 px-2"><span>${CATEGORIES[catKey].icon}</span><span class="cat-badge bg-slate-200 text-slate-500">${CATEGORIES[catKey].label}</span></div>
                    <div class="space-y-2 mb-6">${groups[catKey].sort((a,b) => a.scanned - b.scanned).map(item => `
                        <div class="p-5 rounded-2xl border-2 flex justify-between items-center bg-white ${item.scanned ? 'checked-item border-transparent' : 'border-slate-50 shadow-sm'}">
                            <span class="text-sm font-bold flex-1 pr-4 ${item.scanned ? 'checked-text' : ''}">${item.name}</span>
                            <button onclick="manualToggle(${item.id})" class="h-10 w-10 rounded-xl flex items-center justify-center ${item.scanned ? 'bg-green-100 text-green-600' : 'bg-slate-50 text-slate-300'}">${item.scanned ? '✅' : '⬜'}</button>
                        </div>`).join('')}</div>`;
                container.appendChild(section);
            });
            updateCounter();
        }

        function showFlash(title, msg, type) {
            const notice = document.getElementById('scanNotice');
            notice.classList.remove('hidden', 'bg-green-500', 'bg-orange-500', 'bg-red-500');
            document.getElementById('noticeIcon').innerText = type === 'success' ? "✅" : (type === 'warning' ? "⚠️" : "❌");
            document.getElementById('noticeTitle').innerText = title; document.getElementById('noticeMsg').innerText = msg;
            notice.classList.add(type === 'success' ? 'bg-green-500' : (type === 'warning' ? 'bg-orange-500' : 'bg-red-500'), 'show');
            notice.classList.remove('hidden');
            setTimeout(() => { notice.classList.remove('show'); setTimeout(() => notice.classList.add('hidden'), 300); }, 3000);
        }

        function manualToggle(id) { const item = shoppingList.find(i => i.id === id); toggleItemState(item); }
        function updateCounter() { const count = shoppingList.filter(i => i.scanned).length; const total = shoppingList.length; document.getElementById('main-counter').innerText = count + "/" + total; }
        
        async function archiveOrder() {
            if (shoppingList.length === 0) return;
            const history = JSON.parse(localStorage.getItem('ch_h_v48') || '[]');
            history.unshift({ id: Date.now(), date: new Date().toLocaleString('fr-FR'), score: shoppingList.filter(i => i.scanned).length, total: shoppingList.length, items: shoppingList });
            localStorage.setItem('ch_h_v48', JSON.stringify(history));
            if (currentSyncId && dbClient) await dbClient.from('shopping_items').delete().eq('session_id', currentSyncId);
            localStorage.removeItem('ch_active_session'); location.reload();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const history = JSON.parse(localStorage.getItem('ch_h_v48') || '[]');
            if (history.length === 0) { container.innerHTML = `<p class="text-center py-20 text-slate-300 font-bold uppercase text-xs">Archives vides</p>`; return; }
            container.innerHTML = history.map(o => `
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden mb-4 p-6 text-left">
                    <div class="flex justify-between items-center">
                        <details class="flex-1 group">
                            <summary class="list-none cursor-pointer flex justify-between items-center pr-4">
                                <div><p class="text-[9px] font-black text-blue-500 uppercase leading-none mb-1">${o.date}</p><h3 class="font-bold">Livraison</h3></div>
                                <span class="font-black text-sm ${o.score === o.total ? 'text-green-500' : 'text-orange-500'}">${o.score}/${o.total}</span>
                            </summary>
                            <div class="mt-4 space-y-1.5 border-t pt-4">
                                ${o.items.map(it => `<p class="text-[10px] ${it.scanned ? 'text-slate-400' : 'text-red-500 font-bold'}">${it.scanned ? '✅' : '❌'} ${it.name}</p>`).join('')}
                            </div>
                        </details>
                        <button onclick="deleteOrder(${o.id})" class="p-3 bg-red-50 text-red-500 rounded-2xl active:scale-90 transition-transform text-sm">🗑️</button>
                    </div>
                </div>`).join('');
        }

        function deleteOrder(id) {
            let history = JSON.parse(localStorage.getItem('ch_h_v48') || '[]');
            history = history.filter(o => o.id !== id);
            localStorage.setItem('ch_h_v48', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() { if(confirm("Vider tout ?")) { localStorage.removeItem('ch_h_v48'); renderHistory(); } }
        function setLoading(show) { document.getElementById('loadingOverlay').classList.toggle('hidden', !show); }
        async function resetApp() { if(confirm("Voulez-vous tout effacer ?")) { if (currentSyncId && dbClient) await dbClient.from('shopping_items').delete().eq('session_id', currentSyncId); localStorage.removeItem('ch_active_session'); location.reload(); } }
        document.getElementById('rawTextEditor').addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') confirmList(); });
    </script>
</body>
</html>
