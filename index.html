<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CheckCourses</title>

    <!-- FAVICON (Onglet) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛒%3C/text%3E%3C/svg%3E">

    <!-- ICÔNE IOS (Écran d'accueil) - Encodage optimisé pour iOS -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%232563eb'/%3E%3Ctext x='90' y='122' font-family='Arial, sans-serif' font-weight='900' font-size='85' fill='white' text-anchor='middle'%3ESC%3C/text%3E%3C/svg%3E">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CheckCourses">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .checked-item { background-color: #f0fdf4 !important; border-color: #bbf7d0 !important; opacity: 0.6; }
        .checked-text { text-decoration: line-through; color: #166534; }
        .tab-active { color: #2563eb !important; border-top: 4px solid #2563eb; }
        #reader { width: 100%; border-radius: 32px; overflow: hidden; background: #000; position: relative; }
        #reader video, #reader canvas { border-radius: 32px; width: 100%; }
        .drawingBuffer { position: absolute; top: 0; left: 0; z-index: 10; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
        .cat-badge { font-size: 9px; padding: 2px 6px; border-radius: 99px; text-transform: uppercase; font-weight: 900; letter-spacing: 0.05em; }
        #scanNotice { transition: all 0.3s ease-in-out; transform: translateY(150%); z-index: 300; }
        #scanNotice.show { transform: translateY(0); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans select-none">

    <div id="selectionModal" class="hidden fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-6">
            <h3 class="text-xl font-black text-slate-800 mb-2 italic">Lequel avez-vous ?</h3>
            <div id="modalChoices" class="space-y-3 max-h-[50vh] overflow-y-auto mb-6 pr-2"></div>
            <button onclick="closeSelectionModal()" class="w-full py-4 text-slate-400 font-black uppercase text-[10px]">Annuler</button>
        </div>
    </div>

    <div id="scanNotice" class="fixed inset-x-0 bottom-24 mx-4 p-6 rounded-[2rem] shadow-2xl flex flex-col items-center justify-center text-center border-4 hidden">
        <div id="noticeIcon" class="text-4xl mb-2"></div>
        <div id="noticeTitle" class="text-lg font-black uppercase tracking-tighter"></div>
        <div id="noticeMsg" class="text-sm font-bold opacity-90"></div>
    </div>

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/95 z-[110] flex flex-col items-center justify-center p-8 text-center">
        <div class="loader w-14 h-14 border-4 border-slate-200 rounded-full mb-6"></div>
        <h2 class="text-xl font-black italic uppercase text-blue-600">Traitement...</h2>
    </div>

    <div class="max-w-md mx-auto pb-32">
        <header class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-40 px-6 py-6 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <!-- LOGO GRAPHIQUE + TEXTE -->
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-sm">
                    <span class="text-white font-black text-sm">SC</span>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter uppercase leading-none">
                        <span class="text-slate-900">CHECK</span><span class="text-blue-600">COURSES</span>
                    </h1>
                    <p id="session-display" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Prêt</p>
                </div>
            </div>
            <div id="main-counter" class="bg-blue-600 text-white text-sm font-black px-4 py-2 rounded-full shadow-lg border-2 border-white">0 / 0</div>
        </header>

        <main class="p-4">
            <div id="view-active">
                <section id="stepSync" class="step-content hidden">
                    <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-200 text-center">
                        <div class="text-5xl mb-4">🤝</div>
                        <h2 class="text-xl font-bold mb-2 tracking-tight italic">Synchronisation</h2>
                        <input type="text" id="syncCodeInput" class="w-full p-4 border-2 border-slate-100 rounded-2xl mb-4 text-center font-bold" placeholder="Code de partage">
                        <button onclick="initSync()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase active:scale-95 transition">Rejoindre / Créer</button>
                        <button onclick="skipSync()" class="w-full mt-4 text-slate-400 text-[10px] font-bold uppercase">Mode Local</button>
                    </div>
                </section>

                <section id="step1" class="step-content hidden text-center">
                    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-200">
                        <div class="text-6xl mb-6">📄</div>
                        <h2 class="text-xl font-bold mb-2">Charger un bon</h2>
                        <label class="block cursor-pointer bg-blue-600 text-white font-bold py-5 px-8 rounded-3xl shadow-xl active:scale-95 transition text-lg mt-6">
                            Choisir PDF ou Image
                            <input type="file" id="fileInput" class="hidden" accept="image/*,.pdf" onchange="startProcess(this)">
                        </label>
                    </div>
                </section>

                <section id="stepReview" class="step-content hidden space-y-4">
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                        <h2 class="font-bold text-lg mb-2 text-blue-600 italic uppercase">Correction</h2>
                        <textarea id="rawTextEditor" class="w-full h-80 p-5 border-2 border-slate-100 rounded-2xl text-sm font-medium outline-none focus:border-blue-500 bg-slate-50"></textarea>
                        <button onclick="confirmList()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl mt-4 uppercase text-sm">Valider et Partager</button>
                    </div>
                </section>

                <section id="step2" class="step-content hidden space-y-6">
                    <div id="scannerBlock" class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-200">
                        <div id="reader"></div>
                        <div class="mt-4 flex flex-col items-center bg-slate-50 p-4 rounded-2xl">
                            <span id="lastScannedName" class="text-sm font-bold text-blue-600 text-center">Prêt à scanner</span>
                            <button id="btnToggleScanner" onclick="toggleScanner()" class="mt-4 bg-red-50 text-red-600 px-8 py-2.5 rounded-full text-[10px] font-black uppercase shadow-sm">Caméra On/Off</button>
                        </div>
                    </div>
                    <div id="itemsList" class="space-y-8"></div>
                    <button onclick="archiveOrder()" class="w-full bg-green-500 text-white font-black py-6 rounded-[2.2rem] shadow-xl mt-6 uppercase text-sm">Archiver la livraison</button>
                    <button onclick="resetApp()" class="w-full mt-4 text-slate-300 text-[10px] font-bold uppercase text-center">Tout annuler / Reset</button>
                </section>
            </div>

            <div id="view-history" class="hidden space-y-6">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-2xl font-black text-slate-800 tracking-tighter uppercase italic">Historique</h2>
                    <button onclick="clearHistory()" class="text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-full uppercase tracking-widest">Vider tout</button>
                </div>
                <div id="history-container" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around safe-bottom z-50">
        <button onclick="switchView('active')" id="tab-active" class="flex flex-col items-center py-4 px-10 tab-active transition-all">
            <span class="text-2xl">📦</span><span class="text-[9px] font-black uppercase mt-1 tracking-widest">Scanner</span>
        </button>
        <button onclick="switchView('history')" id="tab-history" class="flex flex-col items-center py-4 px-10 text-slate-300 transition-all">
            <span class="text-2xl">📜</span><span class="text-[9px] font-black uppercase mt-1 tracking-widest text-slate-400">Archives</span>
        </button>
    </nav>

    <script>
        const SUPABASE_URL = "https://pefpsvulzgjhidjowcue.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlZnBzdnVsemdqaGlkam93Y3VlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjU2NTUsImV4cCI6MjA4OTM0MTY1NX0.QpToxUfjbB8MzY8svYLxAVEqerz-u52zpUTu3NobdoY";
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let shoppingList = [];
        let isScanning = false;
        let lastCode = "";
        let lastScanTime = 0;
        let isProcessingScan = false;
        let currentSyncId = null;

        const CATEGORIES = {
            "FRAIS": { icon: "🥛", label: "Frais & Viandes", keywords: /lait|yaourt|beurre|fromage|steak|jambon|poulet|oeuf|traiteur|chiffonnade|beillevaire|creme/i },
            "FRUITS": { icon: "🍎", label: "Fruits & Légumes", keywords: /pomme|banane|tomate|carotte|salade|oignon|fruit|legume|poire|melon|mangue|mais|pois|fraise|peche|courgette|haricot|chou/i },
            "BOISSONS": { icon: "🥤", label: "Boissons", keywords: /eau|jus|soda|biere|vin|cola|the|ice tea|lipton|innocent|volvic|sirop/i },
            "EPICERIE": { icon: "📦", label: "Épicerie", keywords: /pate|riz|gateau|chocolat|sucre|farine|conserve|muesli|biscuit|sable|granola|cereale|chocapic|bjorg|gerble/i },
            "AUTRE": { icon: "✨", label: "Autres", keywords: /./i }
        };

        window.onload = function() {
            const saved = localStorage.getItem('ch_active_session');
            if (saved && JSON.parse(saved).length > 0) {
                shoppingList = JSON.parse(saved);
                currentSyncId = shoppingList[0]?.session_id || null;
                if(currentSyncId) { document.getElementById('session-display').innerText = "☁️ Cloud : " + currentSyncId; subscribeToChanges(); }
                else { document.getElementById('session-display').innerText = "🏠 Local"; }
                showStep('step2'); renderList();
            } else { document.getElementById('session-display').innerText = "Prêt"; showStep('stepSync'); }
        };

        function showStep(id) { document.querySelectorAll('.step-content').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        function switchView(view) {
            const active = document.getElementById('view-active'), history = document.getElementById('view-history'), tabA = document.getElementById('tab-active'), tabH = document.getElementById('tab-history');
            if (view === 'active') { active.classList.remove('hidden'); history.classList.add('hidden'); tabA.classList.add('tab-active'); tabA.classList.remove('text-slate-300'); tabH.classList.remove('tab-active'); tabH.classList.add('text-slate-300'); }
            else { active.classList.add('hidden'); history.classList.remove('hidden'); tabA.classList.remove('tab-active'); tabA.classList.add('text-slate-300'); tabH.classList.add('tab-active'); tabH.classList.remove('text-slate-300'); renderHistory(); if (isScanning) toggleScanner(); }
        }

        async function initSync() {
            const code = document.getElementById('syncCodeInput').value.trim().toLowerCase();
            if (!code) return alert("Entrez un code");
            currentSyncId = code;
            document.getElementById('session-display').innerText = "☁️ Cloud : " + code;
            const { data } = await dbClient.from('shopping_items').select('*').eq('session_id', currentSyncId);
            if (data && data.length > 0) { shoppingList = data; showStep('step2'); renderList(); subscribeToChanges(); } else { showStep('step1'); }
        }

        function skipSync() { currentSyncId = null; document.getElementById('session-display').innerText = "🏠 Local"; showStep('step1'); }

        function subscribeToChanges() {
            if (!dbClient || !currentSyncId) return;
            dbClient.channel('sync-list')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping_items' }, async (payload) => {
                if (payload.eventType === 'UPDATE' && payload.new.session_id === currentSyncId) {
                    const item = shoppingList.find(i => i.id === payload.new.id);
                    if (item) { item.scanned = payload.new.scanned; renderList(); }
                } 
                if (payload.eventType === 'DELETE') {
                    const { count } = await dbClient.from('shopping_items').select('*', { count: 'exact', head: true }).eq('session_id', currentSyncId);
                    if (count === 0) { localStorage.removeItem('ch_active_session'); location.reload(); }
                }
            }).subscribe();
        }

        async function startProcess(input) {
            const file = input.files[0]; if (!file) return; setLoading(true);
            try {
                let text = "";
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        text += textContent.items.map(it => it.str).join(" ") + "\n";
                    }
                } else { const { data: { text: ocrText } } = await Tesseract.recognize(file, 'fra'); text = ocrText; }
                displayReview(text);
            } catch (err) { alert(err.message); }
            setLoading(false);
        }

        function displayReview(text) {
            showStep('stepReview');
            const cleanText = text.replace(/\n/g, ' ');
            const regex = /(\d+[.,]\d+)\s+(\d+[.,]\d+%\s+)(.*?)(?=\s+\d+[.,]\d{2}€)/g;
            let results = []; let matches;
            while ((matches = regex.exec(cleanText)) !== null) {
                let qty = Math.floor(parseFloat(matches[1].replace(',', '.')));
                let name = matches[3].trim().split(/\d+[.,]\d{2}/)[0].trim();
                if (name.length > 3 && !name.match(/Désignation|Montant/i)) { for (let j = 0; j < qty; j++) results.push(name); }
            }
            document.getElementById('rawTextEditor').value = results.length > 0 ? results.join('\n') : text;
        }

        async function confirmList() {
            const lines = document.getElementById('rawTextEditor').value.split('\n').filter(l => l.trim().length > 1);
            shoppingList = lines.map((l, i) => {
                let cat = "AUTRE";
                for(let c in CATEGORIES) { if(l.match(CATEGORIES[c].keywords)) { cat = c; break; } }
                return { id: Date.now() + i, session_id: currentSyncId, name: l.trim(), category: cat, scanned: false };
            });
            if (currentSyncId) {
                setLoading(true);
                await dbClient.from('shopping_items').delete().eq('session_id', currentSyncId);
                const { data } = await dbClient.from('shopping_items').insert(shoppingList).select();
                if (data) shoppingList = data;
                subscribeToChanges(); setLoading(false);
            }
            showStep('step2'); localStorage.setItem('ch_active_session', JSON.stringify(shoppingList));
            renderList(); setTimeout(toggleScanner, 500);
        }

        function toggleScanner() {
            if (isScanning) { Quagga.stop(); isScanning = false; document.getElementById('btnToggleScanner').innerText = "Start Caméra"; } 
            else {
                Quagga.init({
                    inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#reader'), constraints: { facingMode: "environment", width: 1280, height: 720 } },
                    locator: { patchSize: "medium", halfSample: true },
                    decoder: { readers: ["ean_reader", "ean_8_reader", "upc_reader", "code_128_reader"] },
                    locate: true
                }, (err) => { if (err) return; Quagga.start(); isScanning = true; document.getElementById('btnToggleScanner').innerText = "Stop Caméra"; });
            }
        }

        Quagga.onDetected((data) => {
            const code = data.codeResult.code; const now = Date.now();
            if (!code || isProcessingScan || (code === lastCode && now - lastScanTime < 5000)) return;
            isProcessingScan = true; lastCode = code; lastScanTime = now;
            fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`)
                .then(r => r.json()).then(data => {
                    if(data.status === 1) {
                        const name = data.product.product_name_fr || data.product.product_name || "Inconnu";
                        document.getElementById('lastScannedName').innerText = name; smartMatch(name);
                    } else { showFlash("Inconnu", code, "error"); isProcessingScan = false; }
                }).catch(() => { isProcessingScan = false; });
        });

        function smartMatch(scannedName) {
            const normalize = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[.,()]/g, "").split(" ").filter(w => w.length > 2);
            const scannedWords = normalize(scannedName);
            let matches = shoppingList.filter(item => {
                if (item.scanned) return false;
                const itemWords = normalize(item.name); let score = 0;
                scannedWords.forEach(sw => { if (itemWords.some(iw => iw.includes(sw) || sw.includes(iw))) score++; });
                return score >= 2;
            });
            if (matches.length === 0) { showFlash("Non trouvé", scannedName, "warning"); isProcessingScan = false; }
            else if (matches.length === 1) { toggleItemState(matches[0]); isProcessingScan = false; }
            else { openSelectionModal(matches); }
        }

        function openSelectionModal(candidates) {
            const container = document.getElementById('modalChoices'); container.innerHTML = '';
            candidates.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 bg-slate-50 font-bold text-sm active:bg-blue-600 active:text-white transition-all";
                btn.innerText = item.name; btn.onclick = () => { toggleItemState(item); closeSelectionModal(); };
                container.appendChild(btn);
            });
            document.getElementById('selectionModal').classList.remove('hidden');
        }

        function closeSelectionModal() { document.getElementById('selectionModal').classList.add('hidden'); isProcessingScan = false; }

        async function toggleItemState(item) {
            item.scanned = !item.scanned;
            if (currentSyncId) await dbClient.from('shopping_items').update({ scanned: item.scanned }).eq('id', item.id);
            localStorage.setItem('ch_active_session', JSON.stringify(shoppingList));
            renderList();
            if (item.scanned) { showFlash("Validé", item.name, "success"); if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }
        }

        function renderList() {
            const container = document.getElementById('itemsList'); container.innerHTML = '';
            const groups = shoppingList.reduce((acc, item) => { if (!acc[item.category]) acc[item.category] = []; acc[item.category].push(item); return acc; }, {});
            Object.keys(CATEGORIES).forEach(catKey => {
                if (!groups[catKey]) return;
                const section = document.createElement('div');
                section.innerHTML = `
                    <div class="flex items-center gap-2 mb-3 px-2"><span>${CATEGORIES[catKey].icon}</span><span class="cat-badge bg-slate-200 text-slate-500">${CATEGORIES[catKey].label}</span></div>
                    <div class="space-y-2 mb-6">
                        ${groups[catKey].sort((a,b) => a.scanned - b.scanned).map(item => `
                            <div class="p-5 rounded-2xl border-2 flex justify-between items-center bg-white ${item.scanned ? 'checked-item border-transparent' : 'border-slate-100 shadow-sm'}">
                                <span class="text-sm font-bold flex-1 pr-4 ${item.scanned ? 'checked-text' : ''}">${item.name}</span>
                                <button onclick="manualToggle(${item.id})" class="h-10 w-10 rounded-xl flex items-center justify-center ${item.scanned ? 'bg-green-100 text-green-600' : 'bg-slate-50 text-slate-300'}">${item.scanned ? '✅' : '⬜'}</button>
                            </div>`).join('')}
                    </div>`;
                container.appendChild(section);
            });
            updateCounter();
        }

        function showFlash(title, msg, type) {
            const notice = document.getElementById('scanNotice');
            notice.classList.remove('hidden', 'bg-green-500', 'bg-orange-500', 'bg-red-500', 'text-white');
            document.getElementById('noticeIcon').innerText = type === 'success' ? "✅" : (type === 'warning' ? "❓" : "❌");
            document.getElementById('noticeTitle').innerText = title; document.getElementById('noticeMsg').innerText = msg;
            notice.classList.add(type === 'success' ? 'bg-green-500' : (type === 'warning' ? 'bg-orange-500' : 'bg-red-500'), 'text-white', 'show');
            notice.classList.remove('hidden');
            setTimeout(() => { notice.classList.remove('show'); setTimeout(() => notice.classList.add('hidden'), 300); }, 2500);
        }

        function manualToggle(id) { const item = shoppingList.find(i => i.id === id); toggleItemState(item); }

        function updateCounter() {
            const count = shoppingList.filter(i => i.scanned).length; const total = shoppingList.length;
            const el = document.getElementById('main-counter'); el.innerText = `${count} / ${total}`;
            el.className = (count === total && total > 0) ? "bg-green-500 text-white text-sm font-black px-4 py-2 rounded-full shadow-lg border-2 border-white" : "bg-blue-600 text-white text-sm font-black px-4 py-2 rounded-full shadow-lg border-2 border-white";
        }

        async function archiveOrder() {
            if (shoppingList.length === 0) return;
            const history = JSON.parse(localStorage.getItem('ch_history_v31') || '[]');
            history.unshift({ id: Date.now(), date: new Date().toLocaleString('fr-FR'), score: shoppingList.filter(i => i.scanned).length, total: shoppingList.length, items: shoppingList });
            localStorage.setItem('ch_history_v31', JSON.stringify(history));
            if (currentSyncId) await dbClient.from('shopping_items').delete().eq('session_id', currentSyncId);
            localStorage.removeItem('ch_active_session'); location.reload();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            const history = JSON.parse(localStorage.getItem('ch_history_v31') || '[]');
            if (history.length === 0) { container.innerHTML = `<p class="text-center py-20 text-slate-300 font-bold uppercase text-xs">Aucune archive</p>`; return; }
            container.innerHTML = history.map(o => `
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden mb-4 p-6">
                    <div class="flex justify-between items-center mb-4">
                        <details class="flex-1 group">
                            <summary class="list-none cursor-pointer flex justify-between items-center pr-4">
                                <div><p class="text-[9px] font-black text-blue-500 uppercase">${o.date}</p><h3 class="font-bold">Livraison</h3></div>
                                <span class="font-black text-sm ${o.score === o.total ? 'text-green-500' : 'text-orange-500'}">${o.score}/${o.total}</span>
                            </summary>
                            <div class="mt-4 space-y-1.5 border-t pt-4">
                                ${o.items.map(it => `<p class="text-[10px] ${it.scanned ? 'text-slate-400' : 'text-red-500 font-bold'}">${it.scanned ? '✅' : '❌'} ${it.name}</p>`).join('')}
                            </div>
                        </details>
                        <button onclick="deleteOrder(${o.id})" class="p-3 bg-red-50 text-red-500 rounded-2xl active:scale-90 transition-transform text-sm">🗑️</button>
                    </div>
                </div>`).join('');
        }

        function deleteOrder(id) {
            let history = JSON.parse(localStorage.getItem('ch_history_v31') || '[]');
            history = history.filter(o => o.id !== id);
            localStorage.setItem('ch_history_v31', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() { if(confirm("Vider tout ?")) { localStorage.removeItem('ch_history_v31'); renderHistory(); } }
        function setLoading(show) { document.getElementById('loadingOverlay').classList.toggle('hidden', !show); }
        async function resetApp() { if(confirm("Tout effacer ?")) { if (currentSyncId) await dbClient.from('shopping_items').delete().eq('session_id', currentSyncId); localStorage.removeItem('ch_active_session'); location.reload(); } }
        document.getElementById('rawTextEditor').addEventListener('keydown', (e) => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') confirmList(); });
    </script>
</body>
</html>
